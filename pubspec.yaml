name: resilience
description: >-
  Circuit breaker, bulkhead, retry with backoff, timeout, and rate limiter
  policies to keep Dart async calls resilient when a dependency fails or
  throttles. Zero dependencies.
version: 0.1.2
repository: https://github.com/Yusufihsangorgel/resilience
issue_tracker: https://github.com/Yusufihsangorgel/resilience/issues
topics:
  - retry
  - circuit-breaker
  - bulkhead
  - rate-limiting
  - fault-tolerance

environment:
  sdk: ^3.8.0

dev_dependencies:
  fake_async: ^1.3.0
  lints: ^6.0.0
  test: ^1.25.0
