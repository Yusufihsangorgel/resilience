name: resilience
description: >-
  Circuit breaker, bulkhead, retry with backoff, timeout, and rate limiter
  policies to keep Dart async calls resilient when a dependency fails or
  throttles. Zero dependencies.
version: 1.0.0
repository: https://github.com/Yusufihsangorgel/resilience
issue_tracker: https://github.com/Yusufihsangorgel/resilience/issues
topics:
  - retry
  - circuit-breaker
  - bulkhead
  - rate-limiting
  - fault-tolerance

screenshots:
  - description: >-
      Each policy wraps an async action and returns one, so Retry,
      CircuitBreaker, RateLimiter and Timeout nest in whatever order fits your
      action.
    path: doc/architecture.png

environment:
  sdk: ^3.8.0

dev_dependencies:
  fake_async: ^1.3.0
  lints: ^6.0.0
  test: ^1.25.0
