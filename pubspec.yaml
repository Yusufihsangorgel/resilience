name: resilience
description: >-
  Retry with backoff and jitter, circuit breaker, timeout, rate limiter,
  and bulkhead policies for reliable async operations. Zero dependencies.
version: 0.1.0
repository: https://github.com/Yusufihsangorgel/resilience
issue_tracker: https://github.com/Yusufihsangorgel/resilience/issues
topics:
  - retry
  - circuit-breaker
  - bulkhead
  - rate-limiting
  - fault-tolerance

environment:
  sdk: ^3.8.0

dev_dependencies:
  fake_async: ^1.3.0
  lints: ^6.0.0
  test: ^1.25.0
